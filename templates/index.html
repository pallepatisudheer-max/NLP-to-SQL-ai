<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="container">

    <h1>🤖 SQLGenie AI</h1>

    <form method="POST">
        <input
            type="text"
            name="question"
            placeholder="Ask your database in plain English..."
            required
        >

        <button type="submit">
            Generate SQL
        </button>
    </form>

    {% if sql %}
    <div class="sql-box">
        <h3>Generated SQL</h3>
        <pre>{{ sql }}</pre>
    </div>
    {% endif %}

    {% if results is not none %}
    <div class="result-box">
        <h3>Results</h3>
        {{ results.to_html(classes='table', index=False) | safe }}
    </div>
    {% endif %}

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

</div>
